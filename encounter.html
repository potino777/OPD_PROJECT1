<!DOCTYPE html>
<html>
    <head>
        <title>good luck</title>

        <link rel="icon" href="images/favicon.png">
        <link rel="stylesheet" href="styles_encounter.css">

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Balthazar&display=swap" rel="stylesheet">
    </head>
    <body>
        <img class="putin-appearance" id="putin_appearance" src="images/encounter/putin.gif" alt="putin_appearance">
        
        <img class="attack-button" id="attack_button" src="images/encounter/attack_icon.png" alt="attack_icon">
        <img class="call-button" id="call_button" src="images/encounter/call_button.png" alt="call_button">
        
        <img class="continue-button" id="continue_button" src="images/encounter/continue_button.png" alt="continue_button">

        <img class="tv-background" id="tv_background" src="images/tv_background.svg" alt="tv_background">
    
        <img class="loading-circle-anim" id="loading_circle_anim" src="images/loading_circle_anim.gif" alt="loading_circle_anim">
    
        <pre class="dialogue-text" id="dialogue_text"></pre>
        
        <pre class="dialogue-option-text1" id="dialogue_option_text1">...</pre>
        <pre class="dialogue-option-text2" id="dialogue_option_text2">...</pre>
        <pre class="dialogue-option-text3" id="dialogue_option_text3">...</pre>

        <pre class="opponent-announcement" id="opponent_announcement"></pre>

        <img class="stand-point1" id="stand_point1" src="images/encounter/stand_point.png" alt="stand_point">
        <img class="stand-point2" id="stand_point2" src="images/encounter/stand_point.png" alt="stand_point">
        <img class="stand-point3" id="stand_point3" src="images/encounter/stand_point.png" alt="stand_point">
        <img class="stand-point4" id="stand_point4" src="images/encounter/stand_point.png" alt="stand_point">
        
        <img class="self-icon" id="self_icon" src="images/encounter/self_icon.png" alt="self_icon">
        <img class="putin-icon" id="putin_icon" src="images/encounter/putin_icon.png" alt="putin_icon">

        <pre class="self-hp-text" id="self_hp_text">HP: 6</pre>
        <pre class="putin-hp-text" id="putin_hp_text">HP: 12</pre>

        <img class="star" id="star" src="images/encounter/star_icon.gif" alt="star_icon">

        <img class="opp-bear" id="opp_bear" src="images/encounter/opp_bear/idle.png" alt="opp_bear">

        <img class="warning" id="warning" src="images/encounter/warning.gif" alt="warning">

        <img class="opp-russiandrunk" id="opp_russiandrunk" src="images/encounter/opp_russiandrunk/idle.gif" alt="opp_russiandrunk">
        <img class="fire" id="fire" src="images/encounter/opp_russiandrunk/fire.gif" alt="fire">

        <img class="opp-babushka" id="opp_babushka" src="images/encounter/opp_babushka/idle.gif" alt="opp_babushka">
        <img class="pigeons" id="pigeons" src="images/encounter/opp_babushka/pigeons.gif" alt="pigeons">
        <img class="paz" id="paz" src="images/encounter/opp_babushka/paz.png" alt="paz">

        <img class="opp-wideputin" id="opp_wideputin" src="images/encounter/opp_wideputin/idle.gif" alt="wide_putin">

        <script src="script_encounter.js"></script>
    </body>
</html>
